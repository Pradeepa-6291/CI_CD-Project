service: ecothix-backend

provider:
  name: aws
  runtime: nodejs18.x
  region: ap-south-1
  stage: prod
  timeout: 30
  memorySize: 512
  environment:
    MONGO_URI: ${env:MONGO_URI}
    JWT_SECRET: ${env:JWT_SECRET}
    NODE_ENV: production
    CLIENT_URL: ${env:CLIENT_URL}
  httpApi:
    cors:
      allowedOrigins:
        - '*'
      allowedHeaders:
        - Content-Type
        - Authorization
      allowedMethods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS

functions:
  api:
    handler: server.handler
    events:
      - httpApi:
          path: /
          method: ANY
      - httpApi:
          path: /{proxy+}
          method: ANY

package:
  exclude:
    - .env
    - '*.test.js'
    - README.md
    - .git/**
    - node_modules/.cache/**
